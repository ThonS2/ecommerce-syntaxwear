<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/hero.css">
    <link rel="stylesheet" href="./css/categories.css">
    <link rel="stylesheet" href="./css/product-grid.css">
    <meta name="description"
        content="Compre os melhores tênis e sneakers online na Syntaxwear. Encontre modelos exclusivos, ofertas imperdíveis e frete grátis para todo o Brasil.">
    <title>SyntaxWear - Tênis e Sneakers Online</title>
</head>

<body>
    <header class="header">
        <h1 class="logo">
            <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
                <img src="./img/icons/logo-svg.svg" alt="SyntaxWear - Tênis e Sneakers Online">
            </a>
        </h1>
        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>
        <nav class="nav-right" aria-label="Acesso rápido">
            <ul>
                <li><a href="#">Nossa loja</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#" aria-label="Minha conta"><img src="./img/icons/user-svg.svg" alt="minha conta"></a>
                </li>
                <li><a href="#" aria-label="Ajuda"><img src="./img/icons/ajuda-svg.svg" alt="Ajuda"></a></li>
                <li><a href="#" aria-label="Carrinho"><img src="./img/icons/carrinho-svg.svg" alt="Carrinho"></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Krypton one</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="categories-section">
            <div class="category-card casual">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Casual</span>
                </a>
            </div>
            <div class="category-card esporte">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Esporte</span>
                </a>
            </div>
            <div class="category-card moderno">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Moderno</span>
                </a>
            </div>
            <div class="category-card futurista">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Futurista</span>
                </a>
            </div>
        </section>

        <section class="grid-section">
            <div class="card destaque">
                <div class="destaque-content">
                    <h3 class="card-title">Krypton One</h3>
                    <p class="card-subtitle">Estilos Urbanos com atitudes</p>
                    <div class="cta-group">
                        <a href="#" class="btn btn-outline">Feminino</a>
                        <a href="#" class="btn btn-outline">Mascolino</a>
                    </div>
                </div>
            </div>
            <div class="card tenis-roxo"></div>
            <div class="card modelo"></div>
            <div class="card tenis-futurista"></div>
            <div class="card tenis-moderno"></div>
            <div class="card tenis-azul"></div>
        </section>
    </main>

    <footer>

    </footer>
</body>

</html>
